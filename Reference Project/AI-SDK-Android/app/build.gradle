    /*implementation project(':customizeSdk')*/
    /*implementation project(':ztePadSdk')*/
    /*implementation project(':InspurPadSdk')*/
    /*implementation project(':coolPadSdk')*/
    /*implementation project(':lingXiAgent')*/
    /*implementation project(':zuoYeBangLearningMachine')*/
    /*implementation project(':littleElephantPADLearningMachine')*/

    /*implementation(name: 'glasses-SDK0.9.4_', ext: 'aar')
    implementation(name: 'SDK2.1.11-Java32_T1', ext: 'aar')
    implementation 'com.github.gzu-liyujiang:Android_CN_OAID:4.2.11'
    implementation "com.huawei.hms:ads-identifier:3.4.62.300"
    implementation 'com.hihonor.mcs:ads-identifier:1.0.2.301'
    implementation("com.jakewharton.timber:timber:4.7.1")
    implementation 'org.java-websocket:Java-WebSocket:1.5.1'
    implementation("com.squareup.okhttp3:okhttp-sse:4.9.3")*/
}

configurations.all { // check for updates every build
    resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
}
